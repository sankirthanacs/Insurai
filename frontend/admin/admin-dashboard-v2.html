<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InsurAI - Admin Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="admin-dashboard-v2.css">
    <!-- Chart.js for interactive charts -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- Animate.css for smooth animations -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="admin-dashboard-v2.css">
    <!-- Chart.js for interactive charts -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- Animate.css for smooth animations -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
</head>
<body>
    <!-- Sidebar -->
    <aside class="sidebar">
        <div class="sidebar-header">
            <h1 class="logo">InsurAI</h1>
            <p class="logo-subtitle">Admin Console</p>
        </div>
        <nav class="sidebar-nav">
            <a href="#" class="nav-item active" data-page="dashboard">
                <span class="icon">📊</span>
                <span>Dashboard</span>
            </a>
            <a href="#" class="nav-item" data-page="users">
                <span class="icon">👥</span>
                <span>Users & Roles</span>
            </a>
            <a href="#" class="nav-item" data-page="claims">
                <span class="icon">📝</span>
                <span>Claims Monitoring</span>
            </a>
            <a href="#" class="nav-item" data-page="reports">
                <span class="icon">📈</span>
                <span>Reports & Analytics</span>
            </a>
            <a href="#" class="nav-item" data-page="audit-logs">
                <span class="icon">🔍</span>
                <span>Audit Logs</span>
            </a>
        </nav>
        <div class="sidebar-footer">
            <a href="#" class="nav-item logout" onclick="logout()">
                <span class="icon">🚪</span>
                <span>Logout</span>
            </a>
        </div>
    </aside>

    <!-- Main Container -->
    <div class="main-container">
        <!-- Header -->
        <header class="header">
            <div class="search-box">
                <span class="search-icon">🔍</span>
                <input type="text" placeholder="Search...">
            </div>
            <div class="header-actions">
                <button class="theme-toggle" id="theme-toggle" title="Toggle Dark Mode">
                    <span id="theme-icon">🌙</span>
                </button>
                <div class="notification-icon">
                    <span>🔔</span>
                    <span class="badge">3</span>
                </div>
                <div class="admin-profile">
                    <img src="https://ui-avatars.com/api/?name=Admin+User&background=4F46E5&color=fff" alt="Admin">
                    <div>
                        <p class="admin-name">Admin User</p>
                        <p class="admin-role">System Administrator</p>
                    </div>
                </div>
            </div>
        </header>

        <!-- Main Content -->
        <main class="content" id="main-content">
            <!-- Content will be dynamically loaded here -->
        </main>
    </div>

    <!-- Modal Container -->
    <div id="modal-container" class="modal-container hidden">
        <div class="modal-overlay"></div>
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title"></h2>
                <button class="modal-close">&times;</button>
            </div>
            <div class="modal-body"></div>
            <div class="modal-footer"></div>
        </div>
    </div>

    <script src="admin-dashboard-v2.js"></script>
</body>
</html>
