<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Register for InsurAI - Insurance Fraud Detection Platform">
<title>Register - InsurAI</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>

body{
background:linear-gradient(-45deg,#020617,#0f172a,#1e3a8a,#312e81);
background-size:400% 400%;
animation:bgMove 20s infinite alternate;
color:white;
margin:0;
padding:0;
font-family:'Inter', sans-serif;
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
}

@keyframes bgMove{
0%{background-position:left;}
100%{background-position:right;}
}

.register-container{
max-width:450px;
width:90%;
}

.back-link{
display:inline-block;
margin-bottom:20px;
color:#3b82f6;
text-decoration:none;
cursor:pointer;
transition:color 0.3s ease;
font-size:14px;
}

.back-link:hover{
color:#60a5fa;
}

.register-card{
background:rgba(255,255,255,0.08);
padding:45px;
border-radius:24px;
border:1px solid rgba(255,255,255,0.2);
backdrop-filter:blur(20px);
box-shadow:0 20px 60px rgba(0,0,0,0.3);
}

.register-card h1{
font-size:32px;
font-weight:800;
margin-bottom:10px;
background:linear-gradient(135deg,#fff,#a3d5ff);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
background-clip:text;
}

.register-card p{
color:#cbd5f5;
font-size:14px;
margin-bottom:30px;
}

input,select{
width:100%;
padding:13px 16px;
margin-top:14px;
border-radius:10px;
border:1px solid rgba(255,255,255,0.2);
outline:none;
background:rgba(255,255,255,0.1);
color:white;
font-size:14px;
transition:all 0.3s ease;
backdrop-filter:blur(10px);
}

input::placeholder{
color:rgba(255,255,255,0.5);
}

input:focus,select:focus{
background:rgba(255,255,255,0.15);
border-color:rgba(59,130,246,0.5);
box-shadow:0 0 20px rgba(59,130,246,0.2);
}

.password-requirements{
font-size:12px;
color:#8398c7;
margin-top:10px;
padding:12px;
background:rgba(59,130,246,0.1);
border-radius:8px;
border-left:3px solid #3b82f6;
display:none;
}

.password-requirements.show{
display:block;
}

.password-requirements ul{
margin:8px 0 0 20px;
padding:0;
}

.password-requirements li{
list-style:none;
margin:4px 0;
}

.password-requirements .check{
color:#10b981;
}

.password-requirements .uncheck{
color:#ef4444;
}

.btn{
width:100%;
padding:13px;
margin-top:20px;
border-radius:12px;
border:none;
background:linear-gradient(90deg,#3b82f6,#6366f1);
color:white;
font-weight:600;
cursor:pointer;
font-size:14px;
transition:all 0.3s ease;
}

.btn:hover{
transform:translateY(-2px);
box-shadow:0 12px 30px rgba(59,130,246,0.4);
}

.btn:active{
transform:translateY(0);
}

.login-link{
text-align:center;
margin-top:20px;
font-size:13px;
color:#cbd5f5;
}

.login-link a{
color:#3b82f6;
text-decoration:none;
cursor:pointer;
transition:color 0.3s ease;
}

.login-link a:hover{
color:#60a5fa;
}

.terms-checkbox{
display:flex;
align-items:flex-start;
gap:10px;
margin-top:16px;
}

.terms-checkbox input{
margin:0;
margin-top:2px;
width:18px;
height:18px;
padding:0;
min-width:18px;
}

.terms-checkbox label{
font-size:13px;
color:#cbd5f5;
cursor:pointer;
margin:0;
padding:0;
}

.terms-checkbox a{
color:#3b82f6;
text-decoration:none;
}

.form-group{
margin-bottom:5px;
}

.form-group label{
display:block;
font-size:13px;
color:#cbd5f5;
margin-bottom:6px;
margin-top:8px;
font-weight:500;
}

</style>
</head>
<body>

<div class="register-container">
<a class="back-link" onclick="goBack()">← Back to Login</a>

<div class="register-card">
<h1>Create Account</h1>
<p>Join InsurAI and revolutionize your insurance operations</p>

<div class="form-group">
<label>First Name</label>
<input type="text" id="firstName" placeholder="Enter your first name" required>
</div>

<div class="form-group">
<label>Last Name</label>
<input type="text" id="lastName" placeholder="Enter your last name" required>
</div>

<div class="form-group">
<label>Email Address</label>
<input type="email" id="regEmail" placeholder="your@email.com" required>
</div>

<div class="form-group">
<label>Role</label>
<select id="role" required>
<option value="">Select your role</option>
<option value="CUSTOMER">👤 Customer</option>
<option value="UNDERWRITER">🔍 Claim Adjuster</option>
<option value="HR">👤 HR</option>
<option value="ADMIN">👨‍💻 Administrator</option>
</select>
</div>

<div class="form-group">
<label>Password</label>
<input type="password" id="password" placeholder="Create a strong password" oninput="checkPasswordStrength()" required>
<div class="password-requirements" id="passwordReqs">
<ul>
<li><span id="lengthCheck" class="uncheck">✗</span> At least 8 characters</li>
<li><span id="uppercaseCheck" class="uncheck">✗</span> Upper case letter</li>
<li><span id="numberCheck" class="uncheck">✗</span> Number (0-9)</li>
<li><span id="specialCheck" class="uncheck">✗</span> Special character (!@#$%)</li>
</ul>
</div>
</div>

<div class="form-group">
<label>Confirm Password</label>
<input type="password" id="confirmPassword" placeholder="Confirm your password" required>
</div>

<div class="terms-checkbox">
<input type="checkbox" id="terms" required>
<label for="terms">I agree to the <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a></label>
</div>

<button class="btn" onclick="handleRegister()">Create Account</button>

<div class="login-link">
Already have an account? <a onclick="goBack()">Sign in</a>
</div>
</div>
</div>

<script>
window.API_HOST = window.__API_URL__ || 'https://insurai-lhup.onrender.com';
window.API_BASE_URL = window.API_BASE_URL || `${window.API_HOST}/api`;

function goBack(){
window.location.href = 'index.html';
}

function checkPasswordStrength(){
const password = document.getElementById("password").value;
const reqs = document.getElementById("passwordReqs");

reqs.classList.add("show");

const length = password.length >= 8;
const uppercase = /[A-Z]/.test(password);
const number = /[0-9]/.test(password);
const special = /[!@#$%^&*]/.test(password);

updateCheck("lengthCheck", length);
updateCheck("uppercaseCheck", uppercase);
updateCheck("numberCheck", number);
updateCheck("specialCheck", special);
}

function updateCheck(id, isValid){
const element = document.getElementById(id);
if(isValid){
element.classList.remove("uncheck");
element.classList.add("check");
element.textContent = "✓";
}else{
element.classList.remove("check");
element.classList.add("uncheck");
element.textContent = "✗";
}
}

async function handleRegister(){
const firstName = document.getElementById("firstName").value;
const lastName = document.getElementById("lastName").value;
const email = document.getElementById("regEmail").value;
const role = document.getElementById("role").value;
const password = document.getElementById("password").value;
const confirmPassword = document.getElementById("confirmPassword").value;
const termsAccepted = document.getElementById("terms").checked;

if(!firstName || !lastName || !email || !role || !password || !confirmPassword){
alert("Please fill all fields");
return;
}

if(!termsAccepted){
alert("You must agree to the terms of service");
return;
}

if(password !== confirmPassword){
alert("Passwords do not match");
return;
}

if(password.length < 8){
alert("Password must be at least 8 characters long");
return;
}

try{
const response = await fetch(`${API_BASE_URL}/auth/register`, {
method: 'POST',
headers: {
'Content-Type': 'application/json'
},
body: JSON.stringify({
firstName: firstName,
lastName: lastName,
email: email,
role: role,
password: password
})
});

const data = await response.json();

if(response.ok){
    alert("Account created successfully! Redirecting to login...");

    // Notify other tabs (e.g., admin dashboard) about a new registered user
    try {
        const payload = { email, role, timestamp: new Date().toISOString() };
        localStorage.setItem('userRegistered', JSON.stringify(payload));
        if (typeof BroadcastChannel !== 'undefined') {
            const channel = new BroadcastChannel('claim-updates');
            channel.postMessage({ type: 'userRegistered', ...payload });
            channel.close();
        }
    } catch (e) {
        console.warn('Unable to broadcast user registration:', e);
    }

    window.location.href = 'index.html';
}else{
    alert(data.message || "Registration failed. Please try again.");
}
}catch(error){
console.error("Registration error:", error);
alert("Connection error. Check VITE_API_URL / backend URL (https://insurai-lhup.onrender.com)");
}
}
</script>

</body>
</html>
