# --- Kafka Configuration (for real-time events) ---
# Kafka is conditionally enabled based on connectivity or explicit setting
# Set KAFKA_ENABLED=true to force enable, or leave unset for auto-detection
# Set KAFKA_BOOTSTRAP_SERVERS to override default localhost:9092
insurai.kafka.enabled=${KAFKA_ENABLED:false}
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.group-id=insurai-backend
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.properties.spring.json.trusted.packages=*
spring.kafka.template.missing-topics-fatal=false
spring.kafka.listener.missing-topics-fatal=false

# Serve frontend static files from the frontend/ folder (so /hr/hr-dashboard.html works)
# spring.web.resources.static-locations=classpath:/static/,file:../frontend/

# Document file upload path
insurai.upload-dir=${INSURAI_UPLOAD_DIR:uploads}

# --- WebSocket Configuration ---
spring.webflux.websocket.path=/ws
spring.webflux.websocket.allowed-origins=*
spring.webflux.websocket.handshake-timeout=10000
spring.webflux.websocket.buffer-size=8192
spring.webflux.websocket.max-text-message-size=102400
spring.webflux.websocket.max-binary-message-size=102400
spring.sql.init.mode=always
spring.sql.init.continue-on-error=true