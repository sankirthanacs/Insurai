# --- Database Connection (Supabase/PostgreSQL) ---

# --- MySQL Database Connection ---
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.show-sql=true
logging.level.org.hibernate.SQL=DEBUG
logging.level.com.zaxxer.hikari=DEBUG
# --- HikariCP Connection Pool Settings ---
# Optimized for high concurrent load from real-time dashboards
spring.datasource.hikari.maximum-pool-size=50
spring.datasource.hikari.minimum-idle=10
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.leak-detection-threshold=30000
spring.datasource.hikari.connection-test-query=SELECT 1
spring.datasource.hikari.validation-timeout=5000
spring.datasource.hikari.pool-name=InsuraiHikariPool
spring.datasource.hikari.register-mbeans=true

# Ensure Hibernate manages transactions (no autocommit-by-default)
# For MySQL Connector/J 8.3+ and Hibernate 6, disable provider autocommit shielding
# and keep pool `auto-commit=false` so commit() is valid.
spring.datasource.hikari.auto-commit=true
# --- JPA / Hibernate Settings ---
# --- JPA / Hibernate Settings for MySQL ---
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.defer-datasource-initialization=true

# --- JPA Connection Optimization ---
# Optimize connection handling for high concurrency
spring.jpa.properties.hibernate.id.new_generator_mappings=true
spring.jpa.properties.hibernate.jdbc.batch_size=25
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.jdbc.batch_versioned_data=true

# --- Server Port ---
server.port=8080

